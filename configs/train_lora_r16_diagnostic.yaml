experiment:
  name: qwen25_15b_text2sql_r16a32_lr1e4_diagnostic_v1
  stage: qlora_diagnostic
model:
  name: Qwen/Qwen2.5-1.5B-Instruct
data:
  train_path: data/splits/train.jsonl
  eval_path: data/splits/eval.jsonl
diagnostic:
  max_train_samples: 200
  max_eval_samples: 50
  max_steps: 30
training:
  completion_only_loss: true
  max_seq_length: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 1
  learning_rate: 0.0001
  warmup_ratio: 0.1
  logging_steps: 1
  eval_steps: 10
  save_steps: 30
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
outputs:
  adapter_dir: outputs/adapters/lora_r16_diagnostic
  log_path: results/logs/lora_r16_diagnostic_train.jsonl
